<div id="r-package-modal-internal" class="modal {{MODAL_ACTIVE_CLASS}}">
    <div class="modal-background" id="modal-bg"></div>
    <div class="modal-card">
        <header class="modal-card-head">
            <p class="modal-card-title">R Package Installation</p>
            <button class="delete" aria-label="close" id="close-btn-header"></button>
        </header>
        <section class="modal-card-body pb-0 pt-0">
            <div class="content">
                <div class="box mt-4">
                    <pre
                        style="white-space: pre-wrap; word-break: break-all"
                    ><code id="snippet-code">devtools::install_github('MRCIEU/gpmapr')
{{SNIPPET}}</code></pre>
                </div>

                <p>
                    <a
                        href="https://mrcieu.r-universe.dev/articles/gpmapr/gpmapr.html"
                        target="_blank"
                        class="button is-success"
                        >View Vignettes</a
                    >
                    <br />
                    <br />
                    <a href="https://github.com/MRCIEU/gpmapr" target="_blank" class="button is-success">
                        <span>View on GitHub</span>
                    </a>
                </p>
            </div>
        </section>
        <footer class="modal-card-foot">
            <button class="button" id="close-btn-footer">Close</button>
        </footer>
    </div>
</div>
